services:
  db:
    image: postgres:15
    container_name: acg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acg-pass}
      POSTGRES_DB: ${POSTGRES_DB:-acg}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acg_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/usr/src/app:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  db_data:
